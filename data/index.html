<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎使用 HTTP File Server</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #333;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 50px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .logo {
            font-size: 5rem;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #764ba2;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            font-size: 1.1rem;
        }
        
        .info-box {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 25px;
            margin: 30px 0;
            border-left: 4px solid #667eea;
        }
        
        .info-box h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }
        
        .info-row {
            display: flex;
            margin: 10px 0;
            font-size: 0.95rem;
        }
        
        .info-label {
            color: #666;
            width: 100px;
            flex-shrink: 0;
        }
        
        .info-value {
            color: #333;
            font-family: 'Courier New', monospace;
            background: #e9ecef;
            padding: 2px 8px;
            border-radius: 4px;
        }
        
        .features {
            margin: 30px 0;
        }
        
        .features h3 {
            color: #333;
            margin-bottom: 20px;
        }
        
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .feature-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            transition: transform 0.2s;
        }
        
        .feature-item:hover {
            transform: translateY(-3px);
        }
        
        .feature-icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }
        
        .feature-text {
            font-size: 0.9rem;
            color: #555;
        }
        
        .upload-tip {
            background: #e8f5e9;
            border: 2px dashed #4caf50;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            margin-top: 30px;
        }
        
        .upload-tip h3 {
            color: #2e7d32;
            margin-bottom: 10px;
        }
        
        .upload-tip p {
            color: #555;
            margin: 5px 0;
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #e0e0e0;
            color: #999;
            font-size: 0.9rem;
        }
        
        .status-badge {
            display: inline-block;
            background: #4caf50;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🚀</div>
            <h1>HTTP File Server</h1>
            <p class="subtitle">简单、快速的本地文件服务器</p>
            <span class="status-badge">● 运行正常</span>
        </div>
        
        <div class="info-box">
            <h3>📋 服务器信息</h3>
            <div class="info-row">
                <span class="info-label">数据目录:</span>
                <span class="info-value">./data</span>
            </div>
            <div class="info-row">
                <span class="info-label">日志目录:</span>
                <span class="info-value">./log</span>
            </div>
            <div class="info-row">
                <span class="info-label">配置文件:</span>
                <span class="info-value">conf.txt</span>
            </div>
        </div>
        
        <div class="features">
            <h3>✨ 功能特性</h3>
            <div class="feature-grid">
                <div class="feature-item">
                    <div class="feature-icon">📁</div>
                    <div class="feature-text">文件共享</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🌐</div>
                    <div class="feature-text">局域网访问</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🔍</div>
                    <div class="feature-text">自定义404页面</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">📝</div>
                    <div class="feature-text">访问日志记录</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">⚙️</div>
                    <div class="feature-text">外部配置文件</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🎨</div>
                    <div class="feature-text">彩色控制台输出</div>
                </div>
            </div>
        </div>
        
        <div class="upload-tip">
            <h3>📤 开始使用</h3>
            <p>将您的文件放入 <strong>data</strong> 文件夹</p>
            <p>通过浏览器访问本页面即可查看和下载</p>
            <p style="margin-top:15px;color:#888;font-size:0.9rem;">
                替换此 index.html 文件可自定义欢迎页面
            </p>
        </div>
        
        <div class="footer">
            <p>HTTP File Server v2.1 | Python HTTP Server</p>
        </div>
    </div>
    
    <script>
        // 显示当前时间
        document.getElementById('startTime').textContent = new Date().toLocaleString('zh-CN');
    </script>
</body>
</html>
